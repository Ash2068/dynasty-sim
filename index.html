<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynasty & Discord v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <div id="setup-screen" style="display:none; text-align:center;">
            <h1 style="color:var(--accent); margin-bottom: 5px;">DYNASTY & DISCORD</h1>
            <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">v1.0 Public Release</p>

            <div class="sub-box">
                <label>Legal Name</label><br>
                <input type="text" id="input-name" placeholder="Enter Name..." class="btn-ghost" style="width:80%; margin-top:10px; text-align:center;">
                <br><br>
                <button class="btn-ghost" onclick="rollStats()">🎲 Random Identity</button>
            </div>

            <div class="sub-box" style="display: flex; justify-content: space-around; gap: 10px;">
                <div style="flex: 1;">
                    <label>Gender</label><br>
                    <select id="input-gender" class="btn-ghost" style="width: 100%; margin-top: 5px;">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Non-Binary">Non-Binary</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label>Origin</label><br>
                    <select id="input-race" class="btn-ghost" style="width: 100%; margin-top: 5px;">
                        <option value="Northan">Northan</option>
                        <option value="Vanguard">Vanguard</option>
                        <option value="Islander">Islander</option>
                        <option value="Highlander">Highlander</option>
                    </select>
                </div>
            </div>

            <div class="sub-box">
                <label>Starting Region</label><br><br>
                <select id="setup-country" class="btn-ghost" style="width:80%; height:40px;">
                    <option value="United States">United States</option>
                    <option value="United Kingdom">United Kingdom</option>
                    <option value="The Autocracy">The Autocracy</option>
                    <option value="Sealand">Sealand</option>
                </select>
            </div>

            <button class="btn-main" onclick="finalizeLife()" style="margin-top:20px;">BEGIN LEGACY</button>
        </div>

        <div id="main-ui" style="display:none;">
            <div id="global-news-box" style="display:none;" class="news-box-info">
                <p id="news-content">>> SYSTEM READY</p>
            </div>

            <div class="header">
                <button class="btn-ghost" onclick="exitToHome()" style="border:none; font-size:1.2rem; padding:0; cursor:pointer;">🏠</button>
                <h1><span id="char-name">Soul</span></h1>
                <div class="money-display">Bank: <span id="val-money">0</span></div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <label>Health</label>
                    <div class="bar-bg"><div id="bar-health" class="bar-fill" style="background:#4ade80; width:100%;"></div></div>
                </div>
                <div class="stat-box">
                    <label>Mental</label>
                    <div class="bar-bg"><div id="bar-mental" class="bar-fill" style="background:#38bdf8; width:100%;"></div></div>
                </div>
                <div class="stat-box">
                    <label>Fame</label>
                    <div class="bar-bg"><div id="bar-fame" class="bar-fill" style="background:#f472b6; width:0%;"></div></div>
                </div>
            </div>

            <div class="tab-nav">
                <button onclick="showTab('main')">Life</button>
                <button onclick="showTab('assets')">Assets</button>
                <button onclick="showTab('world')">World</button>
            </div>

            <div id="tab-main" class="tab-content">
                <div class="info-row">Age: <span id="val-age">18</span> | IQ: <span id="val-iq">100</span></div>
                <div class="info-row">Standing: <span id="val-standing">Commoner</span></div>
                
                <button class="btn-main" onclick="ageUp()">AGE UP (+1 Year)</button>
                
                <div id="retired-parent-info" style="display:none;" class="sub-box">
                    <p>Parent: <span id="parent-name"></span> (Bond: <span id="val-rel">0</span>%)</p>
                    <button class="btn-ghost" onclick="visitParent()">🎁 Visit Parent ($1k)</button>
                    <button class="btn-ghost" onclick="passTheTorch()">👑 Pass the Torch</button>
                </div>
            </div>

            <div id="tab-assets" class="tab-content" style="display:none;">
                <div class="sub-box">
                    <p>Private Items: <span id="private-count">0</span> | Family Vault: <span id="family-count">0</span></p>
                    <button class="btn-ghost" id="btn-challenge" onclick="challengeDynasty()" style="display:none;">⚖️ Sue Dynasty</button>
                </div>
                <div class="sub-box">
                    <p>Stocks: <span id="val-stocks">$0</span></p>
                    <button class="btn-ghost" onclick="invest(5000)">Invest $5k</button>
                    <button class="btn-ghost" onclick="sellStocks()">Sell All</button>
                </div>
            </div>

            <div id="tab-world" class="tab-content" style="display:none;">
                <div class="sub-box">
                    <p id="stability-text">Stability: Secure</p>
                    <div class="bar-bg" style="height:4px;"><div id="bar-stability" class="bar-fill" style="background:#fbbf24; width:100%;"></div></div>
                </div>
                <button class="btn-ghost" onclick="spreadPropaganda('Cult')">👁️ Start Cult</button>
                <button class="btn-ghost" onclick="goDark()">🕶️ Bribe Police ($10k)</button>
            </div>

            <div id="log">Welcome to the Dynasty. Your legacy starts now.</div>
        </div> </div> <script src="script.js"></script>
</body>
</html>
